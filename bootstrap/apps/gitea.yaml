# Gitea - Git Server Interno (Fuente de Verdad Final)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Durante bootstrap: usa GitHub
    # Después de migración: apuntará a Gitea (self-hosting!)
    repoURL: https://github.com/andres20980/dotfiles.git
    targetRevision: main
    path: gitops-tools/gitea
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
  # Ignorar diferencias en el Secret generado automáticamente por Gitea
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: gitea-admin-secret
      jsonPointers:
        - /data
