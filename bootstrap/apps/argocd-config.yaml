# Argo CD Self-Management
# Argo CD se gestiona a sí mismo para actualizaciones y configuración
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Durante bootstrap: usa GitHub/local con argo-config/
    # Después de migración: apuntará a Gitea
    repoURL: https://github.com/YOUR_USER/argo-config.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
