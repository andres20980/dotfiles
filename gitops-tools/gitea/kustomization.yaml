apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitea

resources:
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - sealed-secret.yaml

labels:
  - pairs:
      app.kubernetes.io/name: gitea
      app.kubernetes.io/component: git-server
      app.kubernetes.io/part-of: gitops-infrastructure
