# Root Application - App of Apps Pattern
# Este es el ÚNICO manifest que se aplica manualmente con kubectl
# Todos los demás recursos se despliegan automáticamente desde aquí
#
# ⚠️  IMPORTANTE: Este root-app apunta a GITEA (source of truth)
# Gitea debe estar desplegado y con repos inicializados ANTES de aplicar esto
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # Finalizer para cascading delete
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  # Source of Truth: Gitea interno (no GitHub)
  source:
    # URL interna de Gitea dentro del cluster
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: main
    path: gitops-manifests/infra-configs/apps-sistema
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  # Sync automático para que los cambios se apliquen inmediatamente
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
