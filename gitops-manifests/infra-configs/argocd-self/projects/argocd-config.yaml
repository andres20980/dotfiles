apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argocd-config
  namespace: argocd
spec:
  description: "Proyecto para que Argo CD se gestione a sí mismo"
  sourceRepos:
    - 'http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git'
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
