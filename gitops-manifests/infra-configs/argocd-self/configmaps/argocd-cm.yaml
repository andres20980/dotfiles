apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Acceso anónimo para entorno de aprendizaje (NO usar en producción)
  users.anonymous.enabled: "true"
  # Reconciliación un poco más rápida para ver cambios durante el aprendizaje
  timeout.reconciliation: "180s"

  # Custom health para SealedSecrets y otras pequeñas mejoras UX
  resource.customizations: |
    bitnami.com/SealedSecret:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "SealedSecret gestionado por el controlador"
        return hs

  # Helm repositories para ApplicationSets
  repositories: |
    - name: argo
      type: helm
      url: https://argoproj.github.io/argo-helm
