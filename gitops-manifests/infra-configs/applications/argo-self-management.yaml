---
# Application principal que gestiona la configuración interna de ArgoCD
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/managed-by: bootstrap
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: default
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: HEAD
    path: infra-configs/argocd-self
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      namespace: argocd
      jsonPointers:
        - /spec/syncPolicy/automated
        - /metadata/annotations/argocd.argoproj.io~1refresh
        - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
        - /operation
    - group: argoproj.io
      kind: ApplicationSet
      namespace: argocd
      jsonPointers:
        - /metadata/annotations/argocd.argoproj.io~1refresh
        - /metadata/annotations/argocd.argoproj.io~1tracking-id
