---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-events-resources
  namespace: argocd
spec:
  project: gitops-tools
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: HEAD
    path: gitops-tools/argo-events
    directory:
      recurse: true
      exclude: install.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-events
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
