---
# ApplicationSet para custom-apps (auto-discovery de apps en custom-apps/)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: custom-apps
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
      revision: HEAD
      directories:
      - path: custom-apps/*
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: custom-apps
      source:
        repoURL: 'http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - PruneLast=true
