apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-calendar
  namespace: argocd
  labels:
    app: app-calendar
    env: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: main
    path: custom-apps/app-calendar
  
  destination:
    server: https://kubernetes.default.svc
    namespace: app-calendar
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 3
  
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
