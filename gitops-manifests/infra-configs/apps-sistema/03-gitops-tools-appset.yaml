# ApplicationSet para GitOps Tools
# Descubrimiento automático de todas las herramientas en gitops-tools/
# Wave 3: Despliega después de Gitea (registry, argo-workflows, argo-events, etc.)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        revision: main
        directories:
          - path: gitops-tools/*
          # Excluir herramientas ya desplegadas manualmente en waves anteriores
          - path: gitops-tools/sealed-secrets
            exclude: true
          - path: gitops-tools/gitea
            exclude: true
  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        {{- if eq .path.basename "kargo-crds" }}
        argocd.argoproj.io/sync-wave: "2.9"
        {{- else if eq .path.basename "kargo" }}
        argocd.argoproj.io/sync-wave: "3.1"
        link.argocd.argoproj.io/external-link: http://localhost:30040
        {{- else if eq .path.basename "dashboard" }}
        link.argocd.argoproj.io/external-link: http://localhost:30090
        {{- else if eq .path.basename "grafana" }}
        link.argocd.argoproj.io/external-link: http://localhost:30030
        {{- else if eq .path.basename "prometheus" }}
        link.argocd.argoproj.io/external-link: http://localhost:30010
        {{- else if eq .path.basename "argo-workflows" }}
        link.argocd.argoproj.io/external-link: http://localhost:30050
        {{- else if eq .path.basename "argo-rollouts" }}
        link.argocd.argoproj.io/external-link: http://localhost:30100
        {{- else if eq .path.basename "registry" }}
        link.argocd.argoproj.io/external-link: http://localhost:30020
        {{- else if eq .path.basename "redis" }}
        link.argocd.argoproj.io/external-link: http://localhost:30070
        {{- end }}
    spec:
      project: {{ if or (eq .path.basename "argo-workflows") (eq .path.basename "argo-events") (eq .path.basename "argo-rollouts") }}argo{{ else }}gitops-tools{{ end }}
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m