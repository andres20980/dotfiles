# ApplicationSet para GitOps Tools
# Descubrimiento automático de todas las herramientas en gitops-tools/
# Wave 3: Despliega después de Gitea (registry, argo-workflows, argo-events, etc.)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        revision: main
        directories:
          - path: gitops-manifests/gitops-tools/*
          # Excluir herramientas ya desplegadas manualmente en waves anteriores
          - path: gitops-manifests/gitops-tools/sealed-secrets
            exclude: true
          - path: gitops-manifests/gitops-tools/gitea
            exclude: true
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: gitops-tools
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      {{- if or (eq .path.basename "dashboard") (eq .path.basename "grafana") (eq .path.basename "kargo") (eq .path.basename "prometheus") (eq .path.basename "argo-workflows") (eq .path.basename "argo-rollouts") (eq .path.basename "registry") (eq .path.basename "redis") }}
      # Enlaces externos en UI de ArgoCD
      info:
      {{- if eq .path.basename "dashboard" }}
        - name: 'Dashboard UI'
          value: 'http://localhost:30090'
      {{- else if eq .path.basename "grafana" }}
        - name: 'Grafana UI'
          value: 'http://localhost:30030'
      {{- else if eq .path.basename "kargo" }}
        - name: 'Kargo UI'
          value: 'http://localhost:30040'
      {{- else if eq .path.basename "prometheus" }}
        - name: 'Prometheus UI'
          value: 'http://localhost:30010'
      {{- else if eq .path.basename "argo-workflows" }}
        - name: 'Workflows UI'
          value: 'http://localhost:30050'
      {{- else if eq .path.basename "argo-rollouts" }}
        - name: 'Rollouts Dashboard'
          value: 'http://localhost:30100'
      {{- else if eq .path.basename "registry" }}
        - name: 'Registry UI'
          value: 'http://localhost:30020'
      {{- else if eq .path.basename "redis" }}
        - name: 'Redis Commander'
          value: 'http://localhost:30070'
      {{- end }}
      {{- end }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m
