# ApplicationSet para herramientas GitOps - List Generator explícito (best-practice para repos simples)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
    - list:
        elements:
          - app: dashboard
          - app: grafana
          - app: kargo
          - app: kargo-crds
          - app: prometheus
          - app: redis
          - app: registry
  template:
    metadata:
      name: '{{app}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        # Forzar refresh inmediato tras creación
        argocd.argoproj.io/refresh: hard
    spec:
      # NOTA: Usar 'default' porque los proyectos custom aún no existen en bootstrap
      project: default
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        targetRevision: main
        path: 'gitops-tools/{{app}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{app}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m
