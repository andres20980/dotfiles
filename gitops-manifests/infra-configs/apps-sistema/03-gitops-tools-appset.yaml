# ApplicationSet para GitOps Tools
# Usa matriz de generators para asignar proyectos correctamente
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
    # Generator para herramientas del proyecto gitops-tools
    - matrix:
        generators:
          - git:
              repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
              revision: main
              directories:
                - path: gitops-tools/*
                - path: gitops-tools/sealed-secrets
                  exclude: true
                - path: gitops-tools/gitea
                  exclude: true
                - path: gitops-tools/argo-workflows
                  exclude: true
                - path: gitops-tools/argo-events
                  exclude: true
                - path: gitops-tools/argo-rollouts
                  exclude: true
          - list:
              elements:
                - project: gitops-tools
    # Generator para herramientas Argo (proyecto argo)
    - matrix:
        generators:
          - git:
              repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
              revision: main
              directories:
                - path: gitops-tools/argo-workflows
                - path: gitops-tools/argo-events
                - path: gitops-tools/argo-rollouts
          - list:
              elements:
                - project: argo
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m
