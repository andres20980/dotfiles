# ApplicationSet para GitOps Tools
# Descubrimiento automático de todas las herramientas en gitops-tools/
# Wave 3: Despliega después de Gitea (registry, argo-workflows, argo-events, etc.)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gitops-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
    - git:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        revision: main
        directories:
          - path: gitops-manifests/gitops-tools/*
          # Excluir herramientas ya desplegadas manualmente en waves anteriores
          - path: gitops-manifests/gitops-tools/sealed-secrets
            exclude: true
          - path: gitops-manifests/gitops-tools/gitea
            exclude: true
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      annotations:
        # URLs externas según herramienta
        link.argocd.argoproj.io/external-link: >-
          {{- if eq .path.basename "argo-workflows" -}}
          http://localhost:30091
          {{- else if eq .path.basename "argo-rollouts" -}}
          http://localhost:30084
          {{- else if eq .path.basename "argo-events" -}}
          http://localhost:30200
          {{- else if eq .path.basename "grafana" -}}
          http://localhost:30082
          {{- else if eq .path.basename "kargo" -}}
          http://localhost:30085
          {{- else if eq .path.basename "prometheus" -}}
          http://localhost:30081
          {{- else if eq .path.basename "registry" -}}
          http://localhost:30096
          {{- else if eq .path.basename "dashboard" -}}
          http://localhost:30090
          {{- end -}}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: gitops-tools
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m
