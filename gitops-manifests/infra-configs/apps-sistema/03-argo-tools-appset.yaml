# ApplicationSet para herramientas Argo - List Generator
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
    - list:
        elements:
          - app: argo-workflows
          - app: argo-events
          - app: argo-rollouts
  template:
    metadata:
      name: '{{app}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        # Forzar refresh inmediato tras creación
        argocd.argoproj.io/refresh: hard
    spec:
      project: argo
      source:
        repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
        targetRevision: main
        path: 'gitops-tools/{{app}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{app}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m
