# Gitea - Git Server Interno
# Fuente de verdad final para GitOps (self-hosting)
# Wave 2: Despliega después de sealed-secrets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    link.argocd.argoproj.io/external-link: http://localhost:30083
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # NOTA: Usar 'default' porque el proyecto 'sistema' aún no existe en bootstrap
  project: default
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: main
    path: gitops-tools/gitea
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
