# ArgoCD Self-Management
# ArgoCD se gestiona a sí mismo para actualizaciones y configuración
# Wave 0: Primera aplicación en desplegarse
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Durante instalación: usa GitHub
    # Después de migración: apuntará a Gitea
    repoURL: https://github.com/andres20980/dotfiles.git
    targetRevision: main
    path: gitops-manifests/infra-configs/configmaps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
