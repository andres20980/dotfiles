# ArgoCD Self-Management
# ArgoCD se gestiona a sí mismo para actualizaciones y configuración
# Wave 0: Primera aplicación en desplegarse
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    link.argocd.argoproj.io/external-link: http://localhost:30080
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: argo
  source:
    # Durante instalación: usa GitHub
    # Después de migración: apuntará a Gitea
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: main
    path: gitops-manifests/infra-configs/argocd-manifests
    # Forzar uso de Kustomize (incluye AppProjects)
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
