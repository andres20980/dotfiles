# Sealed Secrets Controller
# Gestión de secretos encriptados en Git
# Wave 1: Debe estar disponible antes que Gitea y otras herramientas
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sistema
  source:
    repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    targetRevision: main
    path: gitops-tools/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
