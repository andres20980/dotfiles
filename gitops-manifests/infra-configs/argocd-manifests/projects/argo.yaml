# AppProject: argo
# Ecosistema completo de Argo (ArgoCD, Workflows, Events, Rollouts)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argo
  namespace: argocd
spec:
  description: Ecosistema completo de herramientas Argo
  
  # Repositorios permitidos
  sourceRepos:
    - 'http://gitea.gitea.svc.cluster.local:3000/gitops/*'
    - 'https://github.com/*'
  
  # Destinos permitidos
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: argo-workflows
      server: https://kubernetes.default.svc
    - namespace: argo-events
      server: https://kubernetes.default.svc
    - namespace: argo-rollouts
      server: https://kubernetes.default.svc
  
  # Políticas de recursos
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
