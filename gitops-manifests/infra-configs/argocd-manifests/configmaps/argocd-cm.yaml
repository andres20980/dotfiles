apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Acceso anónimo para entorno de aprendizaje (NO usar en producción)
  users.anonymous.enabled: "true"
  # Reconciliación un poco más rápida para ver cambios durante el aprendizaje
  timeout.reconciliation: "180s"

  # Ignorar warnings de Helm/kubectl sobre anotaciones faltantes (UI más limpia)
  resource.compareoptions: |
    ignoreAggregatedRoles: true
  resource.ignoreResourceUpdatesEnabled: "true"

  # Custom health para SealedSecrets y otras pequeñas mejoras UX
  resource.customizations: |
    bitnami.com/SealedSecret:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "SealedSecret gestionado por el controlador"
        return hs
    apps/Deployment:
      health.lua: |
        hs = {}
        if obj.metadata and obj.metadata.namespace == "kargo" and obj.metadata.name == "kargo-api" then
          local rs = obj.status or {}
          local avail = rs.availableReplicas or 0
          if avail >= 1 then
            hs.status = "Healthy"
            hs.message = "kargo-api disponible con replicas=" .. avail
          else
            hs.status = "Progressing"
            hs.message = "Esperando replicas disponibles (availableReplicas=" .. avail .. ")"
          end
          return hs
        end
        -- fallback genérico
        if obj.status and obj.status.availableReplicas and obj.status.availableReplicas > 0 then
          hs.status = "Healthy"
          hs.message = "Deployment con replicas disponibles"
        else
          hs.status = "Progressing"
          hs.message = "Deployment sin replicas disponibles aún"
        end
        return hs
    apiextensions.k8s.io/CustomResourceDefinition:
      health.lua: |
        hs = {}
        -- CRDs de Kargo: simplemente Healthy si existen
        if obj.metadata and obj.metadata.name and string.match(obj.metadata.name, "%.kargo%.akuity%.io$") then
          hs.status = "Healthy"
          hs.message = "Kargo CRD instalado"
          return hs
        end
        -- Fallback genérico para otros CRDs
        if obj.status and obj.status.conditions then
          for _, condition in ipairs(obj.status.conditions) do
            if condition.type == "Established" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = "CRD establecido"
              return hs
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "CRD aún no establecido"
        return hs
    kargo.akuity.io/Project:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Project listo (no lógica adicional en entorno local)"
        return hs
    kargo.akuity.io/Promotion:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Promotion listo"
        return hs
    kargo.akuity.io/Freight:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Freight listo"
        return hs
    kargo.akuity.io/Stage:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Stage listo"
        return hs
    kargo.akuity.io/Warehouse:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "Warehouse listo"
        return hs

  # Helm repositories para ApplicationSets
  repositories: |
    - name: argo
      type: helm
      url: https://argoproj.github.io/argo-helm
