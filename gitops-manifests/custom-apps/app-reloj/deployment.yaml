apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-reloj
  labels:
    app: app-reloj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-reloj
  template:
    metadata:
      labels:
        app: app-reloj
    spec:
      containers:
        - name: app-reloj
          image: app-reloj:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              value: "1.0.0"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
