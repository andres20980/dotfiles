apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-calendar
  namespace: app-calendar
  labels:
    app: app-calendar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-calendar
  template:
    metadata:
      labels:
        app: app-calendar
    spec:
      containers:
        - name: app-calendar
          # Imagen base; kustomization ajusta registry y tag
          image: app-calendar:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
