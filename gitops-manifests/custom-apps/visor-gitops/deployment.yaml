apiVersion: apps/v1
kind: Deployment
metadata:
  name: visor-gitops
  namespace: visor-gitops
  labels:
    app: visor-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visor-gitops
  template:
    metadata:
      labels:
        app: visor-gitops
    spec:
      containers:
      - name: visor-gitops
        image: localhost:30087/visor-gitops:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: APP_VERSION
          value: "dev"
        - name: GIT_COMMIT
          value: "unknown"
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
