apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: registry
  labels:
    app: docker-registry
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: image-store
    app.kubernetes.io/part-of: gitops-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
        app.kubernetes.io/name: registry
        app.kubernetes.io/component: image-store
        app.kubernetes.io/part-of: gitops-tools
    spec:
      containers:
      - name: registry
        image: registry:3.0.0
        ports:
        - containerPort: 5000
        env:
        - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
          value: /var/lib/registry
        - name: REGISTRY_HTTP_ADDR
          value: 0.0.0.0:5000
        - name: REGISTRY_LOG_LEVEL
          value: info
        volumeMounts:
        - name: registry-data
          mountPath: /var/lib/registry
        - name: registry-config
          mountPath: /etc/docker/registry
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /v2/
            port: 5000
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /v2/
            port: 5000
          initialDelaySeconds: 10
        securityContext:
          # Registry imagen oficial no soporta non-root (ejecuta como root por diseño)
          # Para plataforma de aprendizaje local es aceptable
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: registry-data
        emptyDir: {}
      - name: registry-config
        configMap:
          name: registry-config
          items:
          - key: config.yml
            path: config.yml
