---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: bootstrap-sensor
  namespace: argo-events
  annotations:
    gitops/bootstrap: "best-practices-refactor"
spec:
  template:
    serviceAccountName: argo-events-sensor-sa
  dependencies:
    - name: new-repo-push
      eventSourceName: gitea-bootstrap
      eventName: bootstrap
      filters:
        data:
          - path: body.ref
            type: string
            value:
              - "refs/heads/main"
  triggers:
    - template:
        name: bootstrap-app
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: bootstrap-
                namespace: argo-workflows
              spec:
                serviceAccountName: argo-workflow-sa
                workflowTemplateRef:
                  name: bootstrap-app-template
                arguments:
                  parameters:
                    - name: app-name
                      value: "{{body.repository.name}}"
                    - name: repo-url
                      value: "http://gitea.gitea.svc:3000/gitops/{{body.repository.name}}.git"
                    - name: commit-sha
                      value: "{{body.after}}"
