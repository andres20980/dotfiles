apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: gitea-visor-trigger
  namespace: argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  eventBusName: default
  template:
    serviceAccountName: argo-events-sensor-sa
  dependencies:
    - name: push-event
      eventSourceName: gitea-webhook
      eventName: visor-gitops
      filters:
        data:
          - path: header.X-Gitea-Event.0
            type: string
            value:
              - push
  triggers:
    - template:
        name: trigger-workflow
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: visor-gitops-ci-
                namespace: argo-workflows
                labels:
                  app: visor-gitops
                  triggered-by: argo-events
                  workflows.argoproj.io/controller-instanceid: default
              spec:
                serviceAccountName: argo-workflow-sa
                workflowTemplateRef:
                  name: ci-pipeline-template
                arguments:
                  parameters:
                    - name: repo-url
                      value: "http://gitea.gitea.svc.cluster.local:3000/gitops/visor-gitops.git"
                    - name: branch
                      value: "main"
                    - name: commit-sha
                      value: "unknown"
                    - name: image-name
                      value: "visor-gitops"
                    - name: registry
                      value: "docker-registry.registry.svc.cluster.local:5000"
          parameters:
            # Commit SHA desde webhook
            - src:
                dependencyName: push-event
                dataKey: body.after
              dest: spec.arguments.parameters.2.value
            # Branch desde webhook
            - src:
                dependencyName: push-event
                dataKey: body.ref
              dest: spec.arguments.parameters.1.value
