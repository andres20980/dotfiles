apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: gitea-workflow-trigger
  namespace: argo-events
spec:
  eventBusName: default
  serviceAccountName: argo-events-sensor-sa
  dependencies:
    - name: push-event
      eventSourceName: gitea-webhook
      eventName: app-reloj
      filters:
        data:
          - path: header.X-Gitea-Event
            type: string
            value:
              - push
  triggers:
    - template:
        name: trigger-workflow
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: app-reloj-ci-
                namespace: argo-workflows
                labels:
                  app: app-reloj
                  triggered-by: argo-events
                  workflows.argoproj.io/controller-instanceid: default
              spec:
                serviceAccountName: argo-workflow-sa
                workflowTemplateRef:
                  name: ci-pipeline-template
                arguments:
                  parameters:
                    - name: repo-url
                      value: "http://gitea.gitea.svc.cluster.local:3000/gitops/app-reloj.git"
                    - name: branch
                      value: "main"
                    - name: commit-sha
                      value: "unknown"
                    - name: image-name
                      value: "app-reloj"
                    - name: registry
                      value: "docker-registry.registry.svc.cluster.local:5000"
          parameters:
            # Commit SHA desde webhook
            - src:
                dependencyName: push-event
                dataKey: body.after
              dest: spec.arguments.parameters.2.value
            # Branch desde webhook
            - src:
                dependencyName: push-event
                dataKey: body.ref
              dest: spec.arguments.parameters.1.value
