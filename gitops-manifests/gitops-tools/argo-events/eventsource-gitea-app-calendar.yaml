apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: gitea-app-calendar
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
        nodePort: 30301
  serviceType: NodePort
  webhook:
    app-calendar:
      port: "12000"
      endpoint: /app-calendar
      method: POST
