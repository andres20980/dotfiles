apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: gitea-webhook
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
        nodePort: 30200
  serviceType: NodePort
  webhook:
    push:
      port: "12000"
      endpoint: /push
      method: POST
