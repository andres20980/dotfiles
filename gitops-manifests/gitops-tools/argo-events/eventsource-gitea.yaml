apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: gitea-webhook
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
        nodePort: 30200
  serviceType: NodePort
  webhook:
    app-reloj:
      port: "12000"
      endpoint: /app-reloj
      method: POST
    visor-gitops:
      port: "12000"
      endpoint: /visor-gitops
      method: POST
