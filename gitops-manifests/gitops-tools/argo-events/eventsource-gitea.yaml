apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: gitea-webhook
  namespace: argo-events
spec:
  # Un único EventSource con múltiples endpoints (best-practice: reducir objetos)
  service:
    ports:
      - port: 12000
        targetPort: 12000
        nodePort: 30200
  serviceType: NodePort
  webhook:
    app-reloj:
      port: "12000"
      endpoint: /app-reloj
      method: POST
    app-calendar:
      port: "12000"
      endpoint: /app-calendar
      method: POST
    push:
      port: "12000"
      endpoint: /push
      method: POST
