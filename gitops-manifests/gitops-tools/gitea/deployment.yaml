apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
  labels:
    app: gitea
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: git-server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
        app.kubernetes.io/name: gitea
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: init-permissions
        image: gitea/gitea:1.25.1
        command: ['sh', '-c']
        args:
        - |
          mkdir -p /data/git/.ssh /data/gitea
          chown -R 1000:1000 /data
          chmod -R 755 /data
        volumeMounts:
        - name: gitea-storage
          mountPath: /data
        securityContext:
          runAsUser: 0
      containers:
      - name: gitea
        image: gitea/gitea:1.25.1
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: gitea-config
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: ssh
          containerPort: 22
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 200
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: gitea-storage
          mountPath: /data
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: gitea-storage
        persistentVolumeClaim:
          claimName: gitea-pvc
