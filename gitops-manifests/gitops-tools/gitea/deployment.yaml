apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
  labels:
    app: gitea
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: git-server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
        app.kubernetes.io/name: gitea
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: init-permissions
        image: gitea/gitea:1.25.1
        command: ['sh', '-c']
        args:
        - |
          echo "[INIT] Preparando estructura /data";
          mkdir -p /data/git/.ssh /data/gitea/conf /data/ssh;
          chown -R 1000:1000 /data;
          chmod -R 0755 /data;
          ls -al /data/gitea || true;
        volumeMounts:
        - name: gitea-storage
          mountPath: /data
        securityContext:
          runAsUser: 0
      containers:
      - name: gitea
        image: gitea/gitea:1.25.1
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: gitea-config
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        # Puerto SSH deshabilitado (no se usa en entorno de aprendizaje)
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 40
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: gitea-storage
          mountPath: /data
        # NOTA: El contenedor oficial de Gitea (s6-overlay) arranca como root y luego
        # hace drop de privilegios internamente al usuario 'git' (UID 1000). Ejecutarlo
        # directamente con runAsUser=1000 rompe s6-svscan (permiso lock). Para crear
        # usuarios vía CLI usaremos 'su git -c'. Mantenemos endurecimiento sin forzar UID.
        # NOTA: Contenedor oficial Gitea (s6-overlay) necesita arrancar como root
        # y hace drop interno a usuario 'git' (UID 1000). Forzar runAsUser=1000 
        # rompe el sistema de inicio s6-svscan. Para entorno de aprendizaje local
        # aceptamos root startup con capabilities mínimas y sin privilege escalation.
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      volumes:
      - name: gitea-storage
        emptyDir: {}
