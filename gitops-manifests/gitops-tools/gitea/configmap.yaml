apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: gitea
  labels:
    app: gitea
data:
  # Gitea configuration using environment variables
  # https://docs.gitea.com/administration/config-cheat-sheet
  
  # Database
  GITEA__database__DB_TYPE: "sqlite3"
  
  # Security
  GITEA__security__INSTALL_LOCK: "true"
  
  # Service
  GITEA__service__DISABLE_REGISTRATION: "true"
  GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
  
  # OpenID
  GITEA__openid__ENABLE_OPENID_SIGNIN: "false"
  GITEA__openid__ENABLE_OPENID_SIGNUP: "false"
  
  # Actions (CI/CD)
  GITEA__actions__ENABLED: "true"
  GITEA__actions__DEFAULT_ACTIONS_URL: "github"
  
  # Webhook Configuration
  # Allow webhooks to internal/private network addresses
  # This is required for GitOps workflows where webhooks need to reach
  # internal Kubernetes services like Argo Events EventSource
  GITEA__webhook__ALLOWED_HOST_LIST: "private"
  GITEA__webhook__SKIP_TLS_VERIFY: "true"
