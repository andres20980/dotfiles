apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana

resources:
  - configmap.yaml
  - deployment.yaml
  # (eliminado sealed-secret.yaml para entorno local)
  - service.yaml
  - networkpolicy.yaml
  # Ingress deshabilitado: Kind usa NodePort (no ingress controller)
  # - ingress.yaml
  # PDB deshabilitado: innecesario en Kind single-node (best-practice para dev)
  # - pdb.yaml
