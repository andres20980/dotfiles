apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-workflows

resources:
  # 1. Install oficial (CRDs, controller, server, RBAC base)
  - install.yaml
  
  # 2. Service NodePort (acceso externo UI)
  - service-nodeport.yaml
  # 3. SealedSecret para token Gitea CI
  - sealed-secret-gitea.yaml
  - networkpolicy.yaml
  # Ingress deshabilitado: Kind usa NodePort (no ingress controller)
  # - ingress.yaml
  # PDB deshabilitado: innecesario en Kind single-node (best-practice para dev)
  # - pdb.yaml
