apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bootstrap-app-template
  namespace: argo-workflows
spec:
  serviceAccountName: argo-workflow-sa
  entrypoint: bootstrap
  arguments:
    parameters:
      - name: app-name
        value: "placeholder"
      - name: repo-url
        value: "placeholder"
      - name: commit-sha
        value: "placeholder"
  templates:
    - name: bootstrap
      steps:
        - - name: check-if-bootstrapped
            template: check-bootstrap-marker
        - - name: generate-manifests
            template: create-k8s-manifests
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
        - - name: create-ci-eventsource
            template: setup-ci-eventsource
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
          - name: create-ci-sensor
            template: setup-ci-sensor
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
        - - name: create-argocd-app
            template: setup-argocd
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
        - - name: setup-webhook
            template: configure-webhook
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
        - - name: mark-bootstrapped
            template: mark-as-bootstrapped
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
        - - name: trigger-first-build
            template: initial-ci-build
            when: "{{steps.check-if-bootstrapped.outputs.result}} == 'not-bootstrapped'"
    - name: check-bootstrap-marker
      script:
        image: alpine/git:latest
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          git clone {{workflow.parameters.repo-url}} /tmp/repo 2>/dev/null || {
            echo "error-cloning"
            exit 0
          }
          cd /tmp/repo
          if [ -f ".gitops-bootstrapped" ]; then
            echo "already-bootstrapped"
          else
            echo "not-bootstrapped"
          fi
    - name: create-k8s-manifests
      script:
        image: alpine/git:latest
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          APP_NAME="{{workflow.parameters.app-name}}"
          git clone {{workflow.parameters.repo-url}} /tmp/app
          cd /tmp/app
          PORT=$(grep -oP 'EXPOSE\s+\K\d+' Dockerfile 2>/dev/null || echo "3000")
          echo "Puerto detectado: $PORT"
          if [ -f "package.json" ]; then
            VERSION=$(grep -oP '"version":\s*"\K[^"]+' package.json 2>/dev/null || echo "1.0.0")
          else
            VERSION="1.0.0"
          fi
          echo "Versión detectada: $VERSION"
          git clone http://gitops:gitops@gitea.gitea.svc:3000/gitops/gitops-manifests.git /tmp/manifests
          cd /tmp/manifests
          git config user.email "bootstrap@gitops.local"
          git config user.name "GitOps Bootstrap"
          mkdir -p custom-apps/${APP_NAME}
          cat > custom-apps/${APP_NAME}/deployment.yaml <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                  version: "${VERSION}"
              spec:
                containers:
                - name: ${APP_NAME}
                  image: registry.registry.svc.cluster.local:5000/${APP_NAME}:${VERSION}
                  ports:
                  - containerPort: ${PORT}
                    protocol: TCP
                  env:
                  - name: PORT
                    value: "${PORT}"
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 200m
                      memory: 256Mi
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: ${PORT}
                    initialDelaySeconds: 10
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: ${PORT}
                    initialDelaySeconds: 5
                    periodSeconds: 5
          EOF
          NODEPORT=$((30000 + RANDOM % 3000))
          cat > custom-apps/${APP_NAME}/service.yaml <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            labels:
              app: ${APP_NAME}
          spec:
            type: NodePort
            ports:
            - port: 80
              targetPort: ${PORT}
              nodePort: ${NODEPORT}
              protocol: TCP
              name: http
            selector:
              app: ${APP_NAME}
          EOF
          cat > custom-apps/${APP_NAME}/kustomization.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
            - deployment.yaml
            - service.yaml
          images:
            - name: registry.registry.svc.cluster.local:5000/${APP_NAME}
              newTag: "${VERSION}"
          EOF
          git add custom-apps/${APP_NAME}
          git commit -m "feat(bootstrap): generar manifests automáticos para ${APP_NAME} v${VERSION}"
          git push http://gitops:gitops@gitea.gitea.svc:3000/gitops/gitops-manifests.git main
          echo "✅ Manifests generados para ${APP_NAME} en puerto ${PORT}"
    - name: setup-ci-eventsource
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          APP_NAME="{{workflow.parameters.app-name}}"
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: EventSource
          metadata:
            name: gitea-${APP_NAME}
            namespace: argo-events
          spec:
            webhook:
              ${APP_NAME}:
                port: "12000"
                endpoint: /${APP_NAME}
                method: POST
          EOF
          echo "✅ EventSource gitea-${APP_NAME} creado"
    - name: setup-ci-sensor
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          APP_NAME="{{workflow.parameters.app-name}}"
          REPO_URL="{{workflow.parameters.repo-url}}"
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Sensor
          metadata:
            name: ${APP_NAME}-ci
            namespace: argo-events
          spec:
            template:
              serviceAccountName: argo-events-sensor-sa
            dependencies:
              - name: push
                eventSourceName: gitea-${APP_NAME}
                eventName: ${APP_NAME}
                filters:
                  data:
                    - path: body.ref
                      type: string
                      value:
                        - "refs/heads/main"
            triggers:
              - template:
                  name: ci-${APP_NAME}
                  argoWorkflow:
                    operation: submit
                    source:
                      resource:
                        apiVersion: argoproj.io/v1alpha1
                        kind: Workflow
                        metadata:
                          generateName: ci-${APP_NAME}-
                          namespace: argo-workflows
                        spec:
                          workflowTemplateRef:
                            name: ci-generic
                          arguments:
                            parameters:
                              - name: app-name
                                value: "${APP_NAME}"
                              - name: repo-url
                                value: "${REPO_URL}"
                              - name: commit-sha
                                value: "{{body.after}}"
                              - name: manifests-repo
                                value: "http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git"
          EOF
          echo "✅ Sensor ${APP_NAME}-ci creado"
    - name: setup-argocd
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          APP_NAME="{{workflow.parameters.app-name}}"
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${APP_NAME}
            namespace: argocd
            labels:
              app: ${APP_NAME}
              bootstrapped: "true"
          spec:
            project: custom-apps
            source:
              repoURL: http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
              targetRevision: HEAD
              path: custom-apps/${APP_NAME}
            destination:
              server: https://kubernetes.default.svc
              namespace: custom-apps
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - PrunePropagationPolicy=foreground
                - PruneLast=true
          EOF
          echo "✅ Application ${APP_NAME} creada en Argo CD"
    - name: configure-webhook
      script:
        image: curlimages/curl:latest
        command: [sh]
        source: |
          #!/bin/sh
          APP_NAME="{{workflow.parameters.app-name}}"
          curl -X POST \
            -u "gitops:gitops" \
            -H "Content-Type: application/json" \
            http://gitea.gitea.svc:3000/api/v1/repos/gitops/${APP_NAME}/hooks \
            -d "{\n              \"type\": \"gitea\",\n              \"config\": {\n                \"url\": \"http://gitea-webhook-eventsource-svc.argo-events.svc:12000/${APP_NAME}\",\n                \"content_type\": \"json\"\n              },\n              \"events\": [\"push\"],\n              \"active\": true\n            }"
          echo "✅ Webhook CI/CD configurado para ${APP_NAME}"
    - name: mark-as-bootstrapped
      script:
        image: alpine/git:latest
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          git clone {{workflow.parameters.repo-url}} /tmp/repo
          cd /tmp/repo
          echo "Bootstrapped on $(date)" > .gitops-bootstrapped
          echo "App: {{workflow.parameters.app-name}}" >> .gitops-bootstrapped
          echo "Commit: {{workflow.parameters.commit-sha}}" >> .gitops-bootstrapped
          git config user.email "bootstrap@gitops.local"
          git config user.name "GitOps Bootstrap"
          git add .gitops-bootstrapped
          git commit -m "chore: marcar como bootstrapped por GitOps"
          git push http://gitops:gitops@gitea.gitea.svc:3000/gitops/{{workflow.parameters.app-name}}.git main
          echo "✅ Repo marcado como bootstrapped"
    - name: initial-ci-build
      resource:
        action: create
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: ci-{{workflow.parameters.app-name}}-initial-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: ci-generic
            arguments:
              parameters:
                - name: app-name
                  value: "{{workflow.parameters.app-name}}"
                - name: repo-url
                  value: "{{workflow.parameters.repo-url}}"
                - name: commit-sha
                  value: "{{workflow.parameters.commit-sha}}"
                - name: manifests-repo
                  value: "http://gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git"
