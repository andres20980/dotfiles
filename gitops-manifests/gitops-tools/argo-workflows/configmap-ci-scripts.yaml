apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-scripts
  namespace: argo-workflows
data:
  git-clone.sh: |
    #!/bin/sh
    set -e
    
    # Limpiar branch name (remover refs/heads/ si existe)
    CLEAN_BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
    
    echo "🔍 Clonando repositorio $REPO_URL (branch $CLEAN_BRANCH)"
    git clone --depth=1 --branch="$CLEAN_BRANCH" "$REPO_URL" /workspace
    cd /workspace
    
    if [ -n "$COMMIT_SHA" ] && [ "$COMMIT_SHA" != "unknown" ] && [ "$COMMIT_SHA" != "HEAD" ]; then
      echo "📌 Checking out commit: $COMMIT_SHA"
      git fetch --depth=1 origin "$COMMIT_SHA"
      git checkout "$COMMIT_SHA"
    fi
    
    # Extraer versión del package.json si existe
    if [ -f "package.json" ]; then
      VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
      echo "v${VERSION}" > /workspace/.version
      echo "📦 Versión detectada: v${VERSION}"
    else
      echo "v1.0.0" > /workspace/.version
      echo "⚠️ package.json no encontrado, usando versión por defecto: v1.0.0"
    fi
    
    echo "✅ Repository ready"
    ls -la

  update-manifests.sh: |
    #!/bin/sh
    set -e
    
    echo "=== Update Manifests Script ==="
    echo "IMAGE_NAME: $IMAGE_NAME"
    echo "REGISTRY: $REGISTRY"
    echo "VERSION: $VERSION"
    echo "COMMIT_SHA: $COMMIT_SHA"
    
    # Clone gitops-manifests repo
    cd /workspace
    git clone http://${GITEA_USER}:${GITEA_PASSWORD}@gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git manifests
    cd manifests
    
    # Configure git
    git config user.name "CI Bot"
    git config user.email "ci@local.dev"
    
    # Update kustomization.yaml with sem-ver tag
    cd custom-apps/${IMAGE_NAME}
    
    echo "Current kustomization.yaml:"
    cat kustomization.yaml
    
    # Update with VERSION (sem-ver)
    sed -i "s|newName:.*|newName: ${REGISTRY}/${IMAGE_NAME}|g" kustomization.yaml
    sed -i "s|newTag:.*|newTag: ${VERSION}|g" kustomization.yaml
    
    echo "Updated kustomization.yaml:"
    cat kustomization.yaml
    
    # Commit and push
    git add kustomization.yaml
    if git diff --cached --quiet; then
      echo "No changes to commit (already up to date)"
    else
      git commit -m "chore: update ${IMAGE_NAME} to ${VERSION} (${COMMIT_SHA})"
      git push origin main
    fi
    
    echo "=== Manifests updated successfully ==="
