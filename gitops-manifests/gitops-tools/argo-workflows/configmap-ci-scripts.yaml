apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-scripts
  namespace: argo-workflows
data:
  git-clone.sh: |
    #!/bin/sh
    set -e
    
    # Limpiar branch name (remover refs/heads/ si existe)
    CLEAN_BRANCH=$(echo "$BRANCH" | sed 's|refs/heads/||')
    
    echo "🔍 Clonando repositorio $REPO_URL (branch $CLEAN_BRANCH)"
    git clone --depth=1 --branch="$CLEAN_BRANCH" "$REPO_URL" /workspace
    cd /workspace
    
    if [ -n "$COMMIT_SHA" ] && [ "$COMMIT_SHA" != "unknown" ] && [ "$COMMIT_SHA" != "HEAD" ]; then
      echo "📌 Checking out commit: $COMMIT_SHA"
      git fetch --depth=1 origin "$COMMIT_SHA"
      git checkout "$COMMIT_SHA"
    fi
    
    echo "✅ Repository ready"
    ls -la

  docker-build-push.sh: |
    #!/bin/sh
    set -e
    echo "🐳 Building and pushing Docker image..."
    /kaniko/executor \
      --dockerfile=/workspace/Dockerfile \
      --context=/workspace \
      --destination="$IMAGE_REGISTRY/$IMAGE_NAME:$COMMIT_SHA" \
      --destination="$IMAGE_REGISTRY/$IMAGE_NAME:latest" \
      --insecure \
      --skip-tls-verify \
      --cache=true \
      --cache-ttl=24h
    echo "✅ Image pushed: $IMAGE_REGISTRY/$IMAGE_NAME:$COMMIT_SHA"

  update-manifests.sh: |
    #!/bin/sh
    set -e
    echo "📝 Updating Kubernetes manifests..."
    
    # Clone gitops-manifests repo
    cd /tmp
    git clone http://${GITEA_USER}:${GITEA_PASSWORD}@gitea.gitea.svc.cluster.local:3000/gitops/gitops-manifests.git
    cd gitops-manifests
    
    # Check if app directory exists in custom-apps
    if [ ! -d "custom-apps/${IMAGE_NAME}" ]; then
      echo "❌ Directory custom-apps/${IMAGE_NAME} not found in manifests repo"
      exit 1
    fi
    
    cd "custom-apps/${IMAGE_NAME}"
    
    # Update image tag in kustomization.yaml
    if [ -f "kustomization.yaml" ]; then
      sed -i "s|newTag:.*|newTag: ${COMMIT_SHA}|g" kustomization.yaml
      
      # Commit and push
      git config user.name "Argo Workflows"
      git config user.email "argo@gitops.local"
      git add .
      
      if git diff --staged --quiet; then
        echo "ℹ️ No changes to commit"
      else
        git commit -m "ci: update ${IMAGE_NAME} image to ${COMMIT_SHA}"
        git push
        echo "✅ Manifests updated and pushed"
      fi
    else
      echo "❌ kustomization.yaml not found"
      exit 1
    fi
