apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kargo

resources:
  # 1. RBAC (CRDs gestionados ahora por kargo-crds)
  - rbac.yaml
  
  # 3. Secret plano (admin credentials - solo ejemplo para entorno local)
  - secret.yaml
  
  # 4. ConfigMap
  - configmap.yaml
  
  # 5. Deployment
  - deployment.yaml
  
  # 5. Service
  - service.yaml
  - networkpolicy.yaml
  # Ingress deshabilitado: Kind usa NodePort (no ingress controller)
  # - ingress.yaml
  # PDB deshabilitado: innecesario en Kind single-node (best-practice para dev)
  # - pdb.yaml
