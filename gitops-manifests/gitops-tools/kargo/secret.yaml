# Secret de Kargo para entorno local de aprendizaje
# NOTA: En producción usar SealedSecrets
apiVersion: v1
kind: Secret
metadata:
  name: kargo-api
  namespace: kargo
type: Opaque
stringData:
  ADMIN_ACCOUNT_ENABLED: "true"
  ADMIN_ACCOUNT_USERNAME: "admin"
  ADMIN_ACCOUNT_PASSWORD: "admin"
  ADMIN_ACCOUNT_PASSWORD_HASH: "$2a$10$Zrhhie4vLz5ygtVSaif6o.qN36jgs6vjtMBdM6yrU1FOeiAAMMxOm"  # bcrypt hash de "admin"
  ADMIN_ACCOUNT_TOKEN_ISSUER: "http://localhost:30040"
  ADMIN_ACCOUNT_TOKEN_AUDIENCE: "http://localhost:30040"
  ADMIN_ACCOUNT_TOKEN_SIGNING_KEY: "local-dev-signing-key-change-in-production"
  ADMIN_ACCOUNT_TOKEN_TTL: "24h"
