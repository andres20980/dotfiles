apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kargo-baseline
  namespace: kargo
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53