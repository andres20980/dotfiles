# kind-config.yaml
# Configuración para un clúster de kind con puertos expuestos para GitOps
# Rangos de puertos:
#   30080-30099: GitOps Tools principales (ArgoCD, Gitea, Grafana, etc.)
#   30100-30149: Registry, CI/CD y herramientas de build
#   30150-30199: Custom Apps (app-reloj, visor-gitops, futuras apps)
#   30200-30249: Futuras GitOps Tools adicionales
#   30443: HTTPS/Dashboard
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitops-local
networking:
  # Usar la red del host para que los puertos NodePort sean accesibles desde Windows
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
nodes:
- role: control-plane
  # Configuración para exponer puertos
  extraPortMappings:
  # HTTPS/Dashboard
  - containerPort: 30443
    hostPort: 30443
    protocol: TCP
  
  # GitOps Tools principales (30080-30099)
  - containerPort: 30080
    hostPort: 30080
    protocol: TCP  # ArgoCD
  - containerPort: 30081
    hostPort: 30081
    protocol: TCP
  - containerPort: 30082
    hostPort: 30082
    protocol: TCP
  - containerPort: 30083
    hostPort: 30083
    protocol: TCP  # Gitea
  - containerPort: 30084
    hostPort: 30084
    protocol: TCP
  - containerPort: 30085
    hostPort: 30085
    protocol: TCP
  - containerPort: 30086
    hostPort: 30086
    protocol: TCP  # Grafana
