    hostPort: 30088
    protocol: TCP
  - containerPort: 30089
    hostPort: 30089
    protocol: TCP
  - containerPort: 30090
    hostPort: 30090
    protocol: TCP  # Prometheus
  - containerPort: 30091
    hostPort: 30091
    protocol: TCP  # Kargo
  - containerPort: 30092
    hostPort: 30092
    protocol: TCP  # Redis
